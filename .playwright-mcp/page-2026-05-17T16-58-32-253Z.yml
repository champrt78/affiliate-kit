        - generic [ref=e91]:
          - heading "Who This Is For" [level=2] [ref=e92]
          - paragraph [ref=e93]: If you want the sharpest trail-cam photos available without paying a monthly cellular bill, the DS4K Ultimate is calibrated for you. It targets homeowners and property owners who care more about image fidelity than convenience, who don’t mind walking out to swap an SD card every few weeks, and who’d rather pay once for the hardware than commit to a recurring subscription.
