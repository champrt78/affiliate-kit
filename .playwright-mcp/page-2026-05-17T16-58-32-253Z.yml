          - paragraph [ref=e40]: If photo quality is your goal, this is the move. Buy once, cry once.
          - paragraph [ref=e41]: The trade-off is twelve AA batteries and a walk to swap the SD card. The DS4K Ultimate scores 94/100 on Trailcampro's picture-quality testing, ~14 months of battery life on lithium AAs, and zero monthly subscription. For image-quality buyers willing to skip the cellular convenience, this is the strongest pick under $250.
