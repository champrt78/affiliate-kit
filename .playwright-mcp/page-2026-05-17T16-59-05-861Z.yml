        - generic [ref=e120]:
          - heading "Who This Is For" [level=2] [ref=e121]
          - paragraph [ref=e122]: "If you own a house with a backyard, a few acres of property, or a stretch of woods you’d like to keep an eye on, and you want to know what’s actually walking past at 2am, this guide is calibrated for you. The three picks below are matched to three common buyer types: the cellular-convenience buyer who’d rather skip the SD-card retrieval trip, the image-quality buyer who doesn’t want a monthly subscription, and the gift or first-time buyer who wants something under $80 that just works."
          - paragraph [ref=e123]: The picks assume the typical first-time-buyer or gift-buyer mindset. Minimal patience for fiddly settings, low tolerance for monthly subscription surprises, and a strong preference for “set it on a tree and walk away.”
          - heading "What This Guide Covers" [level=2] [ref=e124]
          - paragraph [ref=e125]: "This is a comparison-and-fit guide, not a hands-on review. The picks below are synthesized from manufacturer listings, aggregated owner reviews on Amazon (including the most-upvoted critical reviews, which are usually more informative than the 5-star ones), and the standard feature-axis comparison points across the trail-cam category: image resolution, trigger speed, detection range, battery life, weatherproofing, connectivity model (cellular vs SD-card), and total cost-of-ownership including any subscription."
          - paragraph [ref=e126]: Nothing here claims first-hand testing. The trade-offs called out are the ones that repeatedly show up in verified-buyer reviews and product documentation, not personal anecdotes.
          - heading "At a Glance" [level=2] [ref=e127]
