    - generic [ref=e188]: "Polish-pattern build plan for mywildlifecam review templates. Apply these changes to the single-product review template at `packages/shared-ui/src/components/...` and the buying-guide renderer, propagating to all 5 sites via the shared template: Editorial chrome: · a small-caps rubric eyebrow above every H1 (brass, tracked wide, with a leading rule, ~11px) · a one-sentence deck (italic Fraunces subhead, ~22px) directly under the H1 — sets the framing for the piece · a named byline strip above the fold with an avatar mark, \"by [editorial team / contributor]\", a one-line credential/methodology statement, and \"Last updated [date]\" right-aligned · an italic attribution caption beneath every hero image (e.g. \"Photo: manufacturer media kit\") · a \"How we evaluate\" link in every piece footer pointing to /how-we-evaluate (standalone methodology page surfacing our spec-driven, no-hands-on framing) Decision aids: · a weighted Editorial Scorecard component with 4-5 axes (each with explicit weight + per-axis score bar + composite /10), and a note disclosing the score is derived from spec analysis + verified-buyer reports, NOT lab testing · a two-card \"Buy it if / Don't buy it if\" decision block with bulleted conditions per side (forest border on the buy side, muted-red on the no side) · a \"Flaws but not deal-breakers\" named callout section after Where It Falls Short — preempts the \"why didn't they mention X\" objection while keeping the verdict intact · an FAQ section with 3-5 reader-voice questions + concise answers, marked up with FAQPage schema Constraints: stay inside the locked design system (forest #1F3D2F + cream #F5F0E6 + brass #A07C3A, Fraunces + Inter Tight). Voice doctrine still applies — no hands-on claims anywhere in new chrome copy. Add a frontmatter field per template for any new content surfaces (rubric, deck, byline credit) and surface graceful defaults if the field is omitted."
