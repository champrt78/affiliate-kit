      - heading "Spypoint Flex-M Review" [level=1] [ref=e70]
      - paragraph [ref=e71]: The cellular pick for backyard wildlife watchers who'd rather see photos arrive on their phone than walk out to swap an SD card.
      - generic [ref=e72]:
